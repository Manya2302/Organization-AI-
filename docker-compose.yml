# SecureVault AI — Docker Compose (Phase 1 Infrastructure)
# Zero-cost, self-hosted local deployment
# Run: docker-compose up -d

version: '3.9'

services:
  # ─────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: securevault_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: securevault_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecureVault@2025
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securevault_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────
  # ChromaDB Vector Database
  # ─────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: securevault_chroma
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─────────────────────────────────────
  # PaddleOCR API (Optional - skip if unavailable)
  # ─────────────────────────────────────
  # Uncomment to enable PaddleOCR:
  # paddleocr:
  #   image: paddlepaddle/paddle:2.6.0-cpu
  #   container_name: securevault_ocr
  #   restart: unless-stopped
  #   ports:
  #     - "8866:8866"
  #   command: python -m paddleocr.paddleocr_server --use_gpu=false

  # ─────────────────────────────────────
  # SecureVault Backend API
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: securevault_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: securevault_db
      DB_USER: postgres
      DB_PASSWORD: SecureVault@2025
      JWT_SECRET: ${JWT_SECRET:-securevault_ai_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 24h
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CHROMA_BASE_URL: http://chromadb:8000
      FRONTEND_URL: http://localhost:5173
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  default:
    name: securevault_network
